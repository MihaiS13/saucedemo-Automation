name: Selenium Tests with Allure Report

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the code from the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Java 17 environment
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # 3. Run Selenium tests with Maven (using AspectJ agent for Allure)
      - name: Build and run tests
        run: |
          mvn clean test -DargLine="-javaagent:${HOME}/.m2/repository/org/aspectj/aspectjweaver/1.9.21/aspectjweaver-1.9.21.jar"
        continue-on-error: true # Essential to generate the report even if tests fail

      # 4. Generate the Allure HTML report
      - name: Generate Allure report
        run: mvn allure:report

      # 5. Deploy the report to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: target/site/allure-maven-plugin
