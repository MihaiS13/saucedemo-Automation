name: Selenium Tests with Allure

on:
  push:
    branches: [ master ] 
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout codul (v4)
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setare Java 17 (v4)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # 3. Build & rulează testele cu Maven
      - name: Build with Maven and run tests
        run: |
          mvn clean test -DargLine="-javaagent:${HOME}/.m2/repository/org/aspectj/aspectjweaver/1.9.21/aspectjweaver-1.9.21.jar"
        continue-on-error: true

      # 4. Generează raport Allure
      - name: Generate Allure report
        run: mvn allure:report

      # 5. Încarcă raportul ca artefact 
      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/site/allure-maven-plugin
          if-no-files-found: warn
